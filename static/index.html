<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Taxi Demand Predictor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --blue:#378ADD;--blue-light:#E6F1FB;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --bg:#F4F6F9;--card:#fff;--border:#E8ECF0;
  --text:#1a1a1a;--muted:#7A8499;--subtle:#B0B8C8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* Header */
header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 4px rgba(0,0,0,.04)
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.header-sub{font-size:12px;color:var(--muted);margin-top:1px}
.header-badges{display:flex;gap:8px}
.hbadge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--green-light);color:var(--green-dark)}
.hbadge.blue{background:var(--blue-light);color:#185FA5}

/* Layout */
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px)}

/* Sidebar */
.sidebar{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;padding:16px}
.sidebar-scroll::-webkit-scrollbar{width:4px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.section{margin-bottom:20px}
.section-label{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.field{margin-bottom:10px}
.field label{font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:5px}
input[type=range]{width:100%;height:4px;accent-color:var(--green);cursor:pointer}
.range-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.range-val{font-size:14px;font-weight:700;color:var(--green);background:var(--green-light);padding:2px 8px;border-radius:6px;min-width:32px;text-align:center}
select,input[type=number]{
  width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;background:#FAFBFC;color:var(--text);transition:border .15s
}
select:focus,input[type=number]:focus{outline:none;border-color:var(--green);background:#fff}

.lag-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lag-field label{font-size:11px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px}
.lag-field input{padding:7px 8px;font-size:13px}

/* Buttons */
.btn-group{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn{width:100%;padding:11px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(29,158,117,.25)}
.btn-primary:hover{background:var(--green-dark);box-shadow:0 4px 12px rgba(29,158,117,.35)}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#EBEEF3;border-color:#C8D0DC}
.btn:active{transform:scale(.98)}

/* Result card */
.result-section{padding:16px;border-top:1px solid var(--border)}
.result-card{background:linear-gradient(135deg,#f0fdf8 0%,#e8faf4 100%);border:1.5px solid #A8DFC9;border-radius:12px;padding:16px;text-align:center;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(29,158,117,.06);border-radius:50%}
.result-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.result-num{font-size:52px;font-weight:800;color:var(--green);line-height:1.1;margin:4px 0}
.result-unit{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:8px}
.badge-low{background:#EAF3DE;color:#3B6D11}
.badge-medium{background:#FAEEDA;color:#854F0B}
.badge-high{background:#FCEBEB;color:#A32D2D}
.badge-dot{width:6px;height:6px;border-radius:50%}
.badge-low .badge-dot{background:#3B6D11}
.badge-medium .badge-dot{background:#854F0B}
.badge-high .badge-dot{background:#A32D2D}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.meta-item{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.meta-key{font-size:10px;color:var(--subtle);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.meta-val{font-size:13px;font-weight:600;color:var(--text);margin-top:2px}

/* Top zones */
.top-section{padding:0 16px 16px}
.zone-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F0F3F7}
.zone-item:last-child{border:none}
.zone-num{width:20px;height:20px;border-radius:6px;background:var(--green-light);color:var(--green-dark);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.zone-id{font-size:12px;color:var(--muted);font-weight:500;min-width:48px}
.zone-bar-wrap{flex:1;height:6px;background:#EEF1F6;border-radius:3px;overflow:hidden}
.zone-bar{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
.zone-val{font-size:12px;font-weight:700;color:var(--text);min-width:28px;text-align:right}

/* Loading */
.loading{display:none;align-items:center;justify-content:center;gap:8px;padding:10px;font-size:13px;color:var(--muted)}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Map */
#map{width:100%;height:100%}
.leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);border:1px solid var(--border)}
.leaflet-popup-content{font-size:13px;font-weight:500;color:var(--text);margin:8px 12px}

/* Map overlay stats */
.map-stats{position:absolute;bottom:24px;right:24px;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;gap:20px}
.map-stat-item{text-align:center}
.map-stat-val{font-size:18px;font-weight:700;color:var(--green)}
.map-stat-label{font-size:10px;color:var(--muted);font-weight:500}

/* ── Mobile responsive ── */
@media(max-width:768px){
  body{overflow:auto}

  header{padding:0 14px;height:52px}
  .header-title{font-size:13px}
  .header-sub{display:none}
  .hbadge{font-size:10px;padding:3px 7px}

  /* Stack sidebar on top, map below */
  .layout{
    grid-template-columns:1fr;
    grid-template-rows:auto 380px;
    height:auto;
    overflow:visible;
  }

  .sidebar{
    border-right:none;
    border-bottom:1px solid var(--border);
    overflow:visible;
    max-height:none;
  }
  .sidebar-scroll{overflow:visible;padding:12px}

  /* Map fills second row fully */
  .layout > div:last-child{
    position:relative;
    height:380px;
  }
  #map{height:380px}

  /* Map stats at bottom-left on mobile so it doesn't clip */
  .map-stats{
    bottom:12px;
    right:8px;
    left:8px;
    gap:0;
    justify-content:space-around;
    padding:10px 8px;
  }
  .map-stat-val{font-size:15px}

  /* Result section readable on mobile */
  .result-num{font-size:38px}
  .meta-grid{grid-template-columns:1fr 1fr}
  .lag-grid{grid-template-columns:1fr 1fr}

  /* Buttons full width already — just fix padding */
  .btn-group{padding:10px 12px}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🚕</div>
    <div>
      <div class="header-title">NYC Taxi Demand Predictor</div>
      <div class="header-sub">Trained on Jan 2015 · Evaluated on Jan 2016</div>
    </div>
  </div>
  <div class="header-badges">
    <span class="hbadge">XGBoost</span>
    <span class="hbadge">R² 0.965</span>
    <span class="hbadge blue">40 Zones</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-scroll">

      <div class="section">
        <div class="section-label">Time</div>
        <div class="field">
          <div class="range-row">
            <label>Hour of day</label>
            <span class="range-val" id="hourVal">8</span>
          </div>
          <input type="range" id="hour" min="0" max="23" value="8"
            oninput="document.getElementById('hourVal').textContent=this.value;updateTimeLabel()">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--subtle);margin-top:3px">
            <span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11 PM</span>
          </div>
        </div>
        <div class="field">
          <label>Day of week</label>
          <select id="dow">
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>
          </select>
        </div>
        <div id="timeTag" style="margin-top:6px"></div>
      </div>

      <div class="section">
        <div class="section-label">Zone</div>
        <div class="field">
          <div class="range-row">
            <label>Cluster ID</label>
            <span class="range-val" id="zoneVal">0</span>
          </div>
          <input type="range" id="zone" min="0" max="39" value="0"
            oninput="document.getElementById('zoneVal').textContent=this.value;highlightZone(parseInt(this.value))">
        </div>
        <div id="zoneCoords" style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center"></div>
      </div>

      <div class="section">
        <div class="section-label">Lag values</div>
        <div class="lag-grid">
          <div class="lag-field field"><label>10 min ago</label><input type="number" id="lag1" value="10" min="0"></div>
          <div class="lag-field field"><label>30 min ago</label><input type="number" id="lag3" value="9" min="0"></div>
          <div class="lag-field field"><label>1 hr ago</label><input type="number" id="lag6" value="8" min="0"></div>
          <div class="lag-field field"><label>Yesterday same time</label><input type="number" id="lag144" value="12" min="0"></div>
        </div>
      </div>

    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="predict()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Predict this zone
      </button>
      <button class="btn btn-secondary" onclick="predictAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Predict all 40 zones
      </button>
      <div class="loading" id="loading"><div class="spinner"></div>Predicting...</div>
    </div>

    <div id="resultSection" style="display:none">
      <div class="result-section">
        <div class="result-card">
          <div class="result-label">Predicted pickups</div>
          <div class="result-num" id="predNum">—</div>
          <div class="result-unit">per 10-min bin · Zone <span id="predZone"></span></div>
          <div id="predBadge"></div>
        </div>
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-key">Hour</div><div class="meta-val" id="iHour"></div></div>
          <div class="meta-item"><div class="meta-key">Day</div><div class="meta-val" id="iDay"></div></div>
          <div class="meta-item"><div class="meta-key">Rush hour</div><div class="meta-val" id="iRush"></div></div>
          <div class="meta-item"><div class="meta-key">Demand</div><div class="meta-val" id="iLevel"></div></div>
        </div>
      </div>
    </div>

    <div id="topSection" style="display:none">
      <div class="top-section">
        <div class="section-label" style="margin-bottom:8px">Top 5 zones</div>
        <div id="topZonesList"></div>
      </div>
    </div>

  </div>

  <div style="position:relative">
    <div id="map"></div>
    <div class="map-stats" id="mapStats" style="display:none">
      <div class="map-stat-item">
        <div class="map-stat-val" id="statTotal">—</div>
        <div class="map-stat-label">Total pickups</div>
      </div>
      <div class="map-stat-item">
        <div class="map-stat-val" id="statMax">—</div>
        <div class="map-stat-label">Peak zone</div>
      </div>
      <div class="map-stat-item">
        <div class="map-stat-val" id="statAvg">—</div>
        <div class="map-stat-label">Avg / zone</div>
      </div>
    </div>
  </div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let map, markers = [], zonesData = [];

map = L.map('map').setView([40.734695, -73.990372], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
}).addTo(map);

async function loadZones(){
  const res = await fetch('/zones');
  const data = await res.json();
  zonesData = data.zones;
  data.zones.forEach(z => {
    const m = L.circleMarker([z.lat, z.lon],{
      radius:8, color:'#378ADD', fillColor:'#378ADD',
      fillOpacity:0.55, weight:2
    }).addTo(map).bindPopup(`<b>Zone ${z.zone_id}</b><br>${z.lat}, ${z.lon}`);
    m.on('click', () => {
      document.getElementById('zone').value = z.zone_id;
      document.getElementById('zoneVal').textContent = z.zone_id;
      highlightZone(z.zone_id);
    });
    markers.push({marker:m, zone:z});
  });
  highlightZone(0);
}

function highlightZone(id){
  markers.forEach(({marker, zone}) => {
    if(zone.zone_id === id){
      marker.setStyle({radius:16, color:getComputedStyle(document.documentElement).getPropertyValue('--green').trim()||'#1D9E75', fillColor:'#1D9E75', fillOpacity:0.95, weight:3});
      map.panTo([zone.lat, zone.lon], {animate:true, duration:0.5});
      document.getElementById('zoneCoords').textContent = `Lat ${zone.lat} · Lon ${zone.lon}`;
    } else {
      marker.setStyle({radius:8, color:'#378ADD', fillColor:'#378ADD', fillOpacity:0.55, weight:2});
    }
  });
}

function updateTimeLabel(){
  const h = parseInt(document.getElementById('hour').value);
  let tag = '', cls = '';
  if(h>=7&&h<=9){tag='AM Rush hour';cls='badge-medium'}
  else if(h>=17&&h<=19){tag='PM Rush hour';cls='badge-medium'}
  else if(h>=22||h<=5){tag='Late night';cls='badge-low'}
  else if(h>=10&&h<=16){tag='Daytime';cls='badge-low'}
  else{tag='';cls=''}
  document.getElementById('timeTag').innerHTML = tag
    ? `<span class="badge ${cls}" style="font-size:11px">${tag}</span>`:'';
}

function getInputs(){
  return {
    cluster_id:  parseInt(document.getElementById('zone').value),
    hour_of_day: parseInt(document.getElementById('hour').value),
    day_of_week: parseInt(document.getElementById('dow').value),
    lag_1:  parseFloat(document.getElementById('lag1').value),
    lag_3:  parseFloat(document.getElementById('lag3').value),
    lag_6:  parseFloat(document.getElementById('lag6').value),
    lag_144:parseFloat(document.getElementById('lag144').value),
  };
}

function getBadge(level){
  const map2 = {Low:'badge-low',Medium:'badge-medium',High:'badge-high'};
  return `<span class="badge ${map2[level]||'badge-low'}"><span class="badge-dot"></span>${level} demand</span>`;
}

function setLoading(show){
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

async function predict(){
  setLoading(true);
  document.getElementById('resultSection').style.display='none';
  const body = getInputs();
  const res  = await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await res.json();
  setLoading(false);
  document.getElementById('resultSection').style.display='block';

  document.getElementById('predNum').textContent  = data.prediction;
  document.getElementById('predZone').textContent = data.zone_id;
  document.getElementById('predBadge').innerHTML  = getBadge(data.level);
  document.getElementById('iHour').textContent    = `${data.hour}:00`;
  document.getElementById('iDay').textContent     = DAY_SHORT[data.day];
  const h = data.hour;
  document.getElementById('iRush').textContent = (h>=7&&h<=9)?'AM Rush':(h>=17&&h<=19)?'PM Rush':'—';
  document.getElementById('iLevel').textContent = data.level;
  highlightZone(data.zone_id);
}

async function predictAll(){
  setLoading(true);
  document.getElementById('topSection').style.display='none';
  document.getElementById('mapStats').style.display='none';
  const body = getInputs();
  const res  = await fetch('/predict-all',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await res.json();
  setLoading(false);

  const maxP  = data.zones[0].prediction;
  const total = data.zones.reduce((s,z)=>s+z.prediction,0);
  const avg   = total/data.zones.length;

  data.zones.forEach(z => {
    const norm = z.prediction/(maxP||1);
    const r = Math.round(220*norm+20), g = Math.round(158*(1-norm)+80), b = Math.round(80*(1-norm)+60);
    const color = `rgb(${r},${g},${b})`;
    const m = markers.find(m=>m.zone.zone_id===z.zone_id);
    if(m) m.marker.setStyle({fillColor:color,color:color,fillOpacity:0.85,radius:7+norm*13,weight:2});
  });

  // stats overlay
  document.getElementById('mapStats').style.display='flex';
  document.getElementById('statTotal').textContent = Math.round(total);
  document.getElementById('statMax').textContent   = `#${data.zones[0].zone_id}`;
  document.getElementById('statAvg').textContent   = avg.toFixed(1);

  // top 5
  const top5 = data.zones.slice(0,5);
  document.getElementById('topSection').style.display='block';
  document.getElementById('topZonesList').innerHTML = top5.map((z,i) => `
    <div class="zone-item">
      <div class="zone-num">${i+1}</div>
      <span class="zone-id">Zone ${z.zone_id}</span>
      <div class="zone-bar-wrap"><div class="zone-bar" style="width:${Math.round(z.prediction/maxP*100)}%"></div></div>
      <span class="zone-val">${z.prediction}</span>
    </div>
  `).join('');
}

updateTimeLabel();
loadZones();
</script>
</body>
</html>
