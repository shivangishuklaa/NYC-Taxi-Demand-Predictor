
@"
[server]
headless = true
port = 10000
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#16181f"
textColor = "#e2e8f0"
primaryColor = "#1D9E75"
"@ | Out-File -Encoding UTF8 ".streamlit\config.toml"

# 3. Verify
ls .streamlit\config.toml
cat .streamlit\config.toml
